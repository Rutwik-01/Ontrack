; -----------------------------------------------------------------------------
; OnTrack Companion configuration - SAFE TO COMMIT TO A PUBLIC REPO.
;
; Every genuinely sensitive value below is left BLANK on purpose. At runtime,
; GitHub Actions fills them in from encrypted Secrets (Settings -> Secrets
; and variables -> Actions) - see README for exactly which secrets to create.
;
; NEVER put your real OnTrack token, Gmail password, etc. directly into this
; file if this repo is public - anyone could read it, including in old git
; history even if you edit it out later.
; -----------------------------------------------------------------------------

[ontrack]
base_url = https://ontrack.deakin.edu.au/api

; Left blank - the real token is fetched from the Gist on every run (see
; the [github] section below), not stored here at all.
auth_token =

; Confirmed from the browser Network tab: this OnTrack instance uses
; "Auth-Token" as the header name, not the default "Authorization".
auth_header_name = Auth-Token

; Filled in from the ONTRACK_USERNAME secret at runtime.
username =

insecure_skip_verify = false


[reminders]
start_lead_days = 0
due_lead_days = 3
token_warn_days = 3
force = false


[email]
smtp_host = smtp.gmail.com
smtp_port = 587
use_ssl = false

; Filled in from secrets at runtime: SMTP_USER, SMTP_PASSWORD, EMAIL_TO.
smtp_user =
smtp_password =
from_addr =
to_addr =

subject_prefix = OnTrack


[dashboard]
; Path within THIS repo the dashboard gets committed to. index.html at the
; repo root becomes your GitHub Pages homepage.
output_path = index.html

fetch_comments = true

; Units from your current trimester - shown by default via a "Current" chip.
current_units = SIT738,SIT719,SIT704


[github]
; Left blank on purpose - Actions provides its own token and knows its own
; repo automatically, so nothing needs to go here when running in Actions.
token =
repo_owner =
repo_name =
branch = main
pages_path = index.html

; Filled in from the GIST_ID secret at runtime.
gist_id =
gist_filename = ontrack_token.txt
